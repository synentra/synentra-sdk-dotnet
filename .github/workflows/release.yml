name: Release

on:
  workflow_dispatch:
    inputs:
      rel_version:
        description: 'Release version (examples: 1.9.0-rc.1, 1.9.1)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.x'
  PROJECT_PATH: src/Vectra.Client/Vectra.Client.csproj
  TEST_PROJECT_PATH: tests/Vectra.Client.UnitTests/Vectra.Client.UnitTests.csproj
  ARTIFACTS_DIR: ./artifacts
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  RELEASE_VERSION: ${{ github.event.inputs.rel_version }}

jobs:
  release:
    name: Pack, Release & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore -p:Version=${{ env.RELEASE_VERSION }}

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build

      - name: Pack
        run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.ARTIFACTS_DIR }} -p:Version=${{ env.RELEASE_VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.RELEASE_VERSION }}
          tag_name: v${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: ${{ env.ARTIFACTS_DIR }}/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NuGet.org
        run: dotnet nuget push ${{ env.ARTIFACTS_DIR }}/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source ${{ env.NUGET_SOURCE }} --skip-duplicate
