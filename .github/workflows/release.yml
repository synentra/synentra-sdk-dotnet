name: Release

on:
  workflow_dispatch:
    inputs:
      rel_version:
        description: 'Release version (examples: 1.9.0-rc.1, 1.9.1)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.x'
  PROJECT_PATH: src/Synentra.Client/Synentra.Client.csproj
  TEST_PROJECT_PATH: tests/Synentra.Client.UnitTests/Synentra.Client.UnitTests.csproj
  ARTIFACTS_DIR: ./artifacts
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  RELEASE_VERSION: ${{ github.event.inputs.rel_version }}

jobs:
  release:
    name: Pack, Release & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore -p:Version=${{ env.RELEASE_VERSION }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build

      - name: Pack
        run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.ARTIFACTS_DIR }} -p:Version=${{ env.RELEASE_VERSION }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: v${{ env.RELEASE_VERSION }}
          tag_name: v${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: ${{ env.ARTIFACTS_DIR }}/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate with NuGet (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USERNAME }}

      - name: Publish Package to NuGet.org
        run: |
          dotnet nuget push "${{ env.ARTIFACTS_DIR }}/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "${{ env.NUGET_SOURCE }}" \
            --skip-duplicate

      - name: Publish Symbols to NuGet.org
        run: |
          dotnet nuget push "${{ env.ARTIFACTS_DIR }}/*.snupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "${{ env.NUGET_SOURCE }}" \
            --skip-duplicate